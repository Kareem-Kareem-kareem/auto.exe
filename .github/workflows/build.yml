name: Build RESENDER.exe

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 selenium pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name RESENDER main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RESENDER-windows
          path: dist/RESENDER.exe
          retention-days: 30

      - name: Attach to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RESENDER.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
