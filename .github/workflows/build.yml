name: Build RESENDER.exe

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name RESENDER --icon assets/icon.ico main.py
        continue-on-error: false

      - name: Build .exe (no icon fallback)
        if: failure()
        run: |
          pyinstaller --onefile --windowed --name RESENDER main.py

      - name: Upload .exe as artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: RESENDER-windows
          path: dist/RESENDER.exe
          retention-days: 30

      - name: Upload .exe to Release (on tagged release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RESENDER.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
